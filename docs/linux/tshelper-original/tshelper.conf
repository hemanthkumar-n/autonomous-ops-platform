# ══════════════════════════════════════════════════════════════════
#  tshelper.conf — Configuration File
#  Edit values below to customise tshelper's behaviour.
#
#  This file is auto-loaded from these locations (in order):
#    1. /etc/tshelper.conf          ← system-wide
#    2. <script-dir>/tshelper.conf  ← next to the script
#    3. ~/.tshelper.conf            ← per-user
#
#  Any value not set here falls back to the built-in default.
#  To disable an optional feature, set it to "" or "no".
# ══════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────
#  PROCESS  (ps, top, lsof)
# ──────────────────────────────────────────────

# How many top processes to show
PROCESS_TOP_COUNT=15

# Sort processes by: cpu | mem
PROCESS_SORT_BY=cpu

# Show full command line in process list? yes | no
PROCESS_SHOW_FULL_CMD=yes

# Show open files for a specific PID using lsof -p
# Leave blank to skip. Example: LSOF_PID=1234
LSOF_PID=

# Extra flags passed directly to ps aux
# Example: PS_EXTRA_FLAGS="--forest" for tree-style output
PS_EXTRA_FLAGS=


# ──────────────────────────────────────────────
#  DISK  (df, du, fdisk)
# ──────────────────────────────────────────────

# Root directory to scan for largest dirs (du)
# Example: DISK_SCAN_DIR=/var
DISK_SCAN_DIR=/

# How deep to scan for large directories (du --max-depth)
DISK_SCAN_DEPTH=1

# How many of the largest dirs to show
DISK_TOP_COUNT=10

# Show partition table using fdisk -l? yes | no
# Requires root/sudo to work fully
DISK_SHOW_PARTITION_TABLE=yes

# Filesystem types to exclude from df output (comma-separated)
DISK_EXCLUDE_FS=tmpfs,devtmpfs,squashfs


# ──────────────────────────────────────────────
#  MEMORY  (free, vmstat, ps)
# ──────────────────────────────────────────────

# How many top memory-hungry processes to show
MEMORY_TOP_COUNT=10

# Show vmstat (virtual memory activity)? yes | no
MEMORY_SHOW_VMSTAT=yes

# vmstat sampling interval in seconds
MEMORY_VMSTAT_INTERVAL=1

# vmstat number of samples to collect
MEMORY_VMSTAT_COUNT=3


# ──────────────────────────────────────────────
#  CPU  (lscpu, uptime, mpstat, ps)
# ──────────────────────────────────────────────

# How many top CPU-consuming processes to show
CPU_TOP_COUNT=10

# Show per-core CPU breakdown using mpstat? yes | no
# Requires sysstat: apt install sysstat
CPU_SHOW_PER_CORE=yes


# ──────────────────────────────────────────────
#  NETWORK  (ping, dig, ss, ip, ethtool)
# ──────────────────────────────────────────────

# IP address to ping for raw connectivity test
NETWORK_PING_IP=8.8.8.8

# Domain to ping for DNS + internet test
NETWORK_PING_DOMAIN=google.com

# Number of ping packets to send
NETWORK_PING_COUNT=3

# Ping timeout per packet (seconds)
NETWORK_PING_TIMEOUT=2

# Domain to use for DNS resolution test (dig/nslookup)
NETWORK_DNS_TEST_DOMAIN=google.com

# IP to use for reverse DNS lookup test
NETWORK_REVERSE_DNS_IP=8.8.8.8

# Specific network interface to inspect (leave blank = all)
# Example: NETWORK_INTERFACE=eth0
NETWORK_INTERFACE=

# Max number of unique remote IPs to show in "Who's connected"
NETWORK_MAX_CONNECTIONS=15


# ──────────────────────────────────────────────
#  LOGS  (journalctl, tail)
# ──────────────────────────────────────────────

# Number of system/kernel log lines to show
LOG_SYSTEM_LINES=30

# Number of SSH/auth log lines to show
LOG_AUTH_LINES=10

# Watch an extra systemd service unit's logs
# Example: LOG_EXTRA_UNIT=nginx
LOG_EXTRA_UNIT=

# Path to a custom log file to tail (optional)
# Example: LOG_CUSTOM_FILE=/var/log/myapp/app.log
LOG_CUSTOM_FILE=

# How many lines to show from the custom log file
LOG_CUSTOM_LINES=20


# ──────────────────────────────────────────────
#  SERVICES  (systemctl)
# ──────────────────────────────────────────────

# How many running services to list
SERVICES_TOP_COUNT=20

# Watch a specific service and show its full status
# Example: SERVICE_WATCH=nginx
SERVICE_WATCH=


# ──────────────────────────────────────────────
#  DISPLAY
# ──────────────────────────────────────────────

# Show the ASCII banner? yes | no
SHOW_BANNER=yes

# Pause between sections when running "all" (seconds)
# Set to 0 for no pause
SECTION_PAUSE=0
